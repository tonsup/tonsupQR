<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin - จัดการโฆษณา tonsupQR</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      padding: 2rem 2.5rem;
      width: 100%;
      max-width: 560px;
    }
    h1 { font-size: 1.3rem; color: #1a237e; margin-bottom: 0.5rem; text-align: center; }
    .subtitle { font-size: 0.82rem; color: #888; text-align: center; margin-bottom: 1.5rem; }
    label { display: block; font-size: 0.85rem; color: #555; margin-bottom: 0.2rem; margin-top: 0.8rem; }
    input[type="text"], input[type="password"] {
      width: 100%; padding: 0.5rem 0.8rem; border: 1.5px solid #c5cae9;
      border-radius: 8px; font-size: 0.95rem; outline: none;
    }
    input:focus { border-color: #3949ab; }
    .hint { font-size: 0.75rem; color: #aaa; margin-top: 0.2rem; }
    .ad-group { background: #f5f5f5; border-radius: 10px; padding: 1rem; margin-top: 1rem; }
    .ad-group-title { font-size: 0.9rem; color: #333; font-weight: 600; margin-bottom: 0.3rem; }
    .toggle-row { display: flex; align-items: center; gap: 0.5rem; margin-top: 0.5rem; }
    .toggle-row input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; }
    .toggle-row label { margin: 0; font-size: 0.85rem; }
    .btn {
      display: block; width: 100%; padding: 0.7rem; border: none; border-radius: 8px;
      font-size: 1rem; font-weight: 600; cursor: pointer; margin-top: 1rem; transition: background 0.2s;
    }
    .btn-login { background: #3949ab; color: #fff; }
    .btn-login:hover { background: #283593; }
    .btn-save { background: #3949ab; color: #fff; }
    .btn-save:hover { background: #283593; }
    .btn-load { background: #43a047; color: #fff; }
    .btn-load:hover { background: #2e7d32; }
    .btn-logout { background: #e0e0e0; color: #555; margin-top: 0.5rem; }
    .btn-logout:hover { background: #bdbdbd; }
    .btn-setup { background: #ff8f00; color: #fff; }
    .btn-setup:hover { background: #ff6f00; }
    .btn-reset-token { background: #fff; color: #c62828; border: 1px solid #ef9a9a; margin-top: 0.5rem; font-size: 0.85rem; }
    .btn-reset-token:hover { background: #ffebee; }
    .msg { text-align: center; font-size: 0.9rem; margin-top: 1rem; padding: 0.5rem; border-radius: 8px; }
    .msg-ok { background: #e8f5e9; color: #2e7d32; }
    .msg-err { background: #ffebee; color: #c62828; }
    .preview { margin-top: 1rem; border-top: 1px solid #e0e0e0; padding-top: 0.8rem; }
    .preview-title { font-size: 0.85rem; color: #888; margin-bottom: 0.5rem; }
    .preview-ad {
      padding: 0.5rem 0.8rem; background: linear-gradient(135deg, #fff8e1 0%, #fff3e0 100%);
      border: 1px solid #ffe0b2; border-radius: 8px; color: #e65100;
      font-size: 0.85rem; text-align: center; margin-bottom: 0.3rem;
    }
    .hidden { display: none; }
    .lock-icon { font-size: 2.5rem; text-align: center; margin-bottom: 0.5rem; }
    a { color: #3949ab; }
    .setup-box {
      background: #fff3e0; border: 1px solid #ffe0b2; border-radius: 10px; padding: 1rem; margin-top: 1rem;
    }
    .setup-box-title { font-size: 0.9rem; font-weight: 600; color: #e65100; margin-bottom: 0.3rem; }
    .user-badge { text-align: center; font-size: 0.82rem; color: #888; margin-bottom: 1rem; }
    .user-badge b { color: #3949ab; }
  </style>
</head>
<body>

<!-- ==================== LOGIN ==================== -->
<div class="card" id="page-login">
  <div class="lock-icon">🔐</div>
  <h1>Admin Login</h1>
  <p class="subtitle">จัดการโฆษณา tonsupQR</p>
  <label>Username</label>
  <input type="text" id="login-user" placeholder="Username" autocomplete="username" />
  <label>Password</label>
  <input type="password" id="login-pass" placeholder="Password" autocomplete="current-password" />
  <button class="btn btn-login" onclick="doLogin()">เข้าสู่ระบบ</button>
  <div id="login-msg"></div>
</div>

<!-- ==================== SETUP TOKEN (first time only) ==================== -->
<div class="card hidden" id="page-setup">
  <div class="lock-icon">⚙️</div>
  <h1>ตั้งค่าครั้งแรก</h1>
  <p class="subtitle">ใส่ GitHub Token ครั้งเดียว — ครั้งต่อไปแค่ login ก็พอ</p>
  <div class="setup-box">
    <div class="setup-box-title">📌 วิธีสร้าง Token</div>
    <div class="hint" style="margin-top:0.3rem">
      1. ไปที่ <a href="https://github.com/settings/tokens/new?scopes=repo&description=tonsupQR-admin" target="_blank">สร้าง Token</a><br/>
      2. ติ๊ก ✅ <b>repo</b><br/>
      3. กด Generate token แล้ว copy มาวาง
    </div>
  </div>
  <label>GitHub Token</label>
  <input type="password" id="setup-token" placeholder="ghp_xxxx..." />
  <div class="hint">Token จะถูกเข้ารหัสเก็บใน browser นี้เท่านั้น</div>
  <button class="btn btn-setup" onclick="doSetup()">💾 บันทึก Token</button>
  <div id="setup-msg"></div>
</div>

<!-- ==================== ADMIN ==================== -->
<div class="card hidden" id="page-admin">
  <h1>⚙️ จัดการโฆษณา</h1>
  <div class="user-badge">เข้าสู่ระบบเป็น <b id="admin-username"></b></div>
  <button class="btn btn-load" onclick="loadAds()">📥 โหลดข้อมูลปัจจุบัน</button>
  <div id="ad-slots"></div>
  <div class="preview hidden" id="preview">
    <div class="preview-title">👁️ ตัวอย่าง:</div>
    <div id="preview-content"></div>
  </div>
  <button class="btn btn-save" onclick="saveAds()">💾 บันทึกและอัพเดท</button>
  <div id="admin-msg"></div>
  <button class="btn btn-logout" onclick="doLogout()">🚪 ออกจากระบบ</button>
  <button class="btn btn-reset-token" onclick="doResetToken()">🔄 เปลี่ยน Token</button>
</div>

<script>
// ─── Config ──────────────────────────────────────────────────────
var REPO_OWNER = 'tonsup';
var REPO_NAME = 'tonsupQR';
var FILE_PATH = 'ads.json';
var BRANCH = 'main';
var NUM_SLOTS = 3;

// SHA-256 hashes of username and password
var VALID_USER_HASH = '4b60d1526b3d6c2517492c75aa44a2920b6d3bd9f95f78792d7d7a59db2cb28d';
var VALID_PASS_HASH = '23ccd81d3329e15b5813e1c0f7109ee259053e3dc5bc4203f6071097f1d26887';

// ─── SHA-256 ─────────────────────────────────────────────────────
function sha256(str) {
  var buf = new TextEncoder().encode(str);
  return crypto.subtle.digest('SHA-256', buf).then(function(hash) {
    return Array.from(new Uint8Array(hash)).map(function(b) {
      return b.toString(16).padStart(2, '0');
    }).join('');
  });
}

// ─── XOR encrypt/decrypt for token storage ───────────────────────
function xorCrypt(text, key) {
  var result = [];
  for (var i = 0; i < text.length; i++) {
    result.push(text.charCodeAt(i) ^ key.charCodeAt(i % key.length));
  }
  return result;
}
function xorEncrypt(text, key) {
  return btoa(String.fromCharCode.apply(null, xorCrypt(text, key)));
}
function xorDecrypt(encoded, key) {
  try {
    var decoded = atob(encoded);
    var result = [];
    for (var i = 0; i < decoded.length; i++) {
      result.push(String.fromCharCode(decoded.charCodeAt(i) ^ key.charCodeAt(i % key.length)));
    }
    return result.join('');
  } catch(e) { return ''; }
}

// ─── Page nav ────────────────────────────────────────────────────
function showPage(id) {
  ['page-login', 'page-setup', 'page-admin'].forEach(function(p) {
    document.getElementById(p).classList.toggle('hidden', p !== id);
  });
}
function showMsg(elId, text, ok) {
  var el = document.getElementById(elId);
  el.className = 'msg ' + (ok ? 'msg-ok' : 'msg-err');
  el.textContent = text;
  setTimeout(function() { el.textContent = ''; el.className = ''; }, 5000);
}

// ─── Login ───────────────────────────────────────────────────────
var _sessionKey = '';

function doLogin() {
  var user = document.getElementById('login-user').value.trim();
  var pass = document.getElementById('login-pass').value;
  if (!user || !pass) { showMsg('login-msg', 'กรุณากรอก username และ password', false); return; }

  Promise.all([sha256(user), sha256(pass)]).then(function(hashes) {
    if (hashes[0] === VALID_USER_HASH && hashes[1] === VALID_PASS_HASH) {
      _sessionKey = user + ':' + pass;
      var stored = localStorage.getItem('tonsupQR_enc_token');
      if (stored) {
        var token = xorDecrypt(stored, _sessionKey);
        if (token && token.startsWith('ghp_')) {
          document.getElementById('admin-username').textContent = user;
          showPage('page-admin');
          renderSlots([]);
          return;
        }
      }
      showPage('page-setup');
    } else {
      showMsg('login-msg', '❌ Username หรือ Password ไม่ถูกต้อง', false);
    }
  });
}

// ─── Setup token ─────────────────────────────────────────────────
function doSetup() {
  var token = document.getElementById('setup-token').value.trim();
  if (!token || !token.startsWith('ghp_')) {
    showMsg('setup-msg', 'Token ต้องขึ้นต้นด้วย ghp_', false); return;
  }
  localStorage.setItem('tonsupQR_enc_token', xorEncrypt(token, _sessionKey));
  document.getElementById('admin-username').textContent = document.getElementById('login-user').value.trim();
  showPage('page-admin');
  renderSlots([]);
  showMsg('admin-msg', '✅ บันทึก Token เรียบร้อย! ครั้งต่อไปแค่ login ก็พอ', true);
}

function getToken() {
  var stored = localStorage.getItem('tonsupQR_enc_token');
  if (!stored || !_sessionKey) return null;
  var token = xorDecrypt(stored, _sessionKey);
  return (token && token.startsWith('ghp_')) ? token : null;
}

// ─── Logout / Reset ──────────────────────────────────────────────
function doLogout() {
  _sessionKey = '';
  document.getElementById('login-user').value = '';
  document.getElementById('login-pass').value = '';
  showPage('page-login');
}
function doResetToken() {
  localStorage.removeItem('tonsupQR_enc_token');
  showPage('page-setup');
}

// ─── Ad Slots ────────────────────────────────────────────────────
function esc(s) { return s ? s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;') : ''; }
function escH(s) { return s ? s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') : ''; }

function renderSlots(ads) {
  var c = document.getElementById('ad-slots'), html = '';
  for (var i = 0; i < NUM_SLOTS; i++) {
    var ad = (ads && ads[i]) || { text: '', link: '', enabled: false };
    html += '<div class="ad-group">';
    html += '<div class="ad-group-title">โฆษณาที่ ' + (i+1) + '</div>';
    html += '<label>ข้อความ</label>';
    html += '<input type="text" id="ad-text-'+i+'" value="'+esc(ad.text)+'" placeholder="เช่น 🎉 โปรโมชั่นพิเศษ!" oninput="updatePreview()" />';
    html += '<label>Link (ไม่บังคับ)</label>';
    html += '<input type="text" id="ad-link-'+i+'" value="'+esc(ad.link)+'" placeholder="https://..." oninput="updatePreview()" />';
    html += '<div class="toggle-row"><input type="checkbox" id="ad-on-'+i+'"'+(ad.enabled?' checked':'')+' onchange="updatePreview()" />';
    html += '<label for="ad-on-'+i+'">เปิดใช้งาน</label></div></div>';
  }
  c.innerHTML = html;
  updatePreview();
}

function getAdsFromForm() {
  var ads = [];
  for (var i = 0; i < NUM_SLOTS; i++) {
    ads.push({
      text: document.getElementById('ad-text-'+i).value.trim(),
      link: document.getElementById('ad-link-'+i).value.trim(),
      enabled: document.getElementById('ad-on-'+i).checked
    });
  }
  return ads;
}

function updatePreview() {
  var ads = getAdsFromForm(), html = '', has = false;
  ads.forEach(function(ad) {
    if (!ad.enabled || !ad.text) return;
    has = true;
    html += '<div class="preview-ad">' + escH(ad.text) + (ad.link ? ' 🔗' : '') + '</div>';
  });
  document.getElementById('preview').classList.toggle('hidden', !has);
  document.getElementById('preview-content').innerHTML = html;
}

// ─── GitHub API ──────────────────────────────────────────────────
function loadAds() {
  var token = getToken();
  if (!token) { showMsg('admin-msg', '❌ Token ไม่พบ กรุณา logout แล้ว login ใหม่', false); return; }

  fetch('https://api.github.com/repos/'+REPO_OWNER+'/'+REPO_NAME+'/contents/'+FILE_PATH+'?ref='+BRANCH, {
    headers: { 'Authorization': 'token '+token, 'Accept': 'application/vnd.github.v3+json' }
  })
  .then(function(r) { if (!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
  .then(function(data) {
    window._fileSha = data.sha;
    var content = JSON.parse(atob(data.content));
    renderSlots(content.ads);
    showMsg('admin-msg', '✅ โหลดข้อมูลสำเร็จ!', true);
  })
  .catch(function(e) { showMsg('admin-msg', '❌ โหลดไม่ได้: '+e.message, false); renderSlots([]); });
}

function saveAds() {
  var token = getToken();
  if (!token) { showMsg('admin-msg', '❌ Token ไม่พบ กรุณา logout แล้ว login ใหม่', false); return; }

  var ads = getAdsFromForm();
  var json = JSON.stringify({ ads: ads }, null, 2) + '\n';
  var encoded = btoa(unescape(encodeURIComponent(json)));
  var body = { message: 'Update ads via admin', content: encoded, branch: BRANCH };
  if (window._fileSha) body.sha = window._fileSha;

  fetch('https://api.github.com/repos/'+REPO_OWNER+'/'+REPO_NAME+'/contents/'+FILE_PATH, {
    method: 'PUT',
    headers: { 'Authorization': 'token '+token, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  })
  .then(function(r) { if (!r.ok) return r.json().then(function(d){ throw new Error(d.message||'HTTP '+r.status); }); return r.json(); })
  .then(function(data) {
    window._fileSha = data.content.sha;
    showMsg('admin-msg', '✅ บันทึกสำเร็จ! หน้า QR จะอัพเดทภายใน 1-2 นาที', true);
  })
  .catch(function(e) { showMsg('admin-msg', '❌ บันทึกไม่ได้: '+e.message, false); });
}

// ─── Enter key ───────────────────────────────────────────────────
document.getElementById('login-pass').addEventListener('keydown', function(e) { if (e.key==='Enter') doLogin(); });
document.getElementById('setup-token').addEventListener('keydown', function(e) { if (e.key==='Enter') doSetup(); });
showPage('page-login');
</script>
</body>
</html>
